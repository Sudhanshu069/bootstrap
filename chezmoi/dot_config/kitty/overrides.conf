# =========================================================
# kitty overrides.conf (macOS)
# Cleaned, deduplicated, and prompt-safe
# =========================================================

# -------------------------
# Appearance & layout
# -------------------------
macos_show_window_title_in none
macos_titlebar_color background

# Keep bottom flush for tmux/statusline
window_padding_width 12 12 0 12
single_window_padding_width 12 12 0 12
placement_strategy bottom

# Optional translucency
background_opacity 0.95
background_blur 6

# -------------------------
# Fonts
# -------------------------
font_family FiraCode Nerd Font
font_size 16
disable_ligatures never

# -------------------------
# Cursor
# -------------------------
# Keep block cursor everywhere, including shell prompts
cursor_shape block
cursor_shape_unfocused hollow
cursor_blink_interval 0
shell_integration no-cursor

# -------------------------
# Scrollback
# -------------------------
scrollback_lines 300000
scrollbar scrolled
scrollbar_interactive yes
scrollbar_jump_on_click yes

# -------------------------
# Clipboard & selection
# -------------------------
copy_on_select clipboard
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
paste_actions quote-urls-at-prompt,confirm,confirm-if-large
strip_trailing_spaces smart

# -------------------------
# Keybinds (macOS)
# -------------------------
map cmd+c copy_or_noop
map cmd+v paste_from_clipboard
map cmd+f search_scrollback

shell_integration enabled no-cursor
