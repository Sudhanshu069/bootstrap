"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
palette = "catppuccin_mocha"

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$golang\
$java\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold blue"
truncation_length = 3
truncation_symbol = "‚Ä¶/"
read_only = " Û∞åæ"
format = "[$path]($style)[$read_only]($style) "

[directory.substitutions]
Developer = "Û∞≤ã "
Documents = "Û∞àô "
Downloads = "ÔÄô "
Music = "Û∞ùö "
Pictures = "ÔÄæ "

[git_branch]
symbol = "Ôêò "
style = "bold mauve"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = "[$all_status$ahead_behind]($style) "

[nodejs]
symbol = "Óúò "
style = "bold green"
format = "via [$symbol$version]($style) "

[python]
symbol = "Óàµ "
style = "bold green"
format = "via [$symbol$version(\\($virtualenv\\))]($style) "

[golang]
symbol = "Óòß "
style = "bold green"
format = "via [$symbol$version]($style) "

[java]
symbol = "Óâñ "
style = "bold green"
format = "via [$symbol$version]($style) "

[docker_context]
symbol = "Ôåà "
style = "bold sapphire"
format = "via [$symbol$context]($style) "
only_with_files = true

[aws]
symbol = "ÓåΩ "
style = "bold peach"
format = "on [$symbol$profile]($style) "
disabled = false

[cmd_duration]
min_time = 2000
show_milliseconds = true
format = "took [$duration](bold yellow) "

[line_break]
disabled = false

[character]
success_symbol = "[‚ùØ](bold green)"
error_symbol = "[‚ùØ](bold red)"
vimcmd_symbol = "[‚ùÆ](bold green)"
vimcmd_replace_one_symbol = "[‚ùÆ](bold lavender)"
vimcmd_replace_symbol = "[‚ùÆ](bold lavender)"
vimcmd_visual_symbol = "[‚ùÆ](bold yellow)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
