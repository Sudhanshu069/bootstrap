"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
palette = "gruvbox_dark"

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$golang\
$java\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold blue"
truncation_length = 3
truncation_symbol = "ÔÇª/"
read_only = " ¾░î¥"
format = "[$path]($style)[$read_only]($style) "

[directory.substitutions]
Developer = "¾░▓ï "
Documents = "¾░êÖ "
Downloads = "´ÇÖ "
Music = "¾░ØÜ "
Pictures = "´Ç¥ "

[git_branch]
symbol = "´Éÿ "
style = "bold mauve"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = "[$all_status$ahead_behind]($style) "

[nodejs]
symbol = "¯£ÿ "
style = "bold green"
format = "via [$symbol$version]($style) "

[python]
symbol = "¯êÁ "
style = "bold green"
format = "via [$symbol$version(\\($virtualenv\\))]($style) "

[golang]
symbol = "¯ÿº "
style = "bold green"
format = "via [$symbol$version]($style) "

[java]
symbol = "¯ëû "
style = "bold green"
format = "via [$symbol$version]($style) "

[docker_context]
symbol = "´îê "
style = "bold sapphire"
format = "via [$symbol$context]($style) "
only_with_files = true

[aws]
symbol = "¯î¢ "
style = "bold peach"
format = "on [$symbol$profile]($style) "
disabled = false

[cmd_duration]
min_time = 2000
show_milliseconds = true
format = "took [$duration](bold yellow) "

[line_break]
disabled = false

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold green)"
vimcmd_replace_one_symbol = "[ÔØ«](bold lavender)"
vimcmd_replace_symbol = "[ÔØ«](bold lavender)"
vimcmd_visual_symbol = "[ÔØ«](bold yellow)"

[palettes.gruvbox_dark]
red = "#fb4934"
maroon = "#cc241d"
peach = "#fe8019"
yellow = "#fabd2f"
green = "#b8bb26"
