# =========================================================
# Minimal, sane tmux.conf (macOS + kitty)
# =========================================================

# ---------- Terminal / colors ----------
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# ---------- UX basics ----------
set -g mouse on
set -g history-limit 100000
set -sg escape-time 10
set -g focus-events on

# Don't let apps rename your windows
set -g allow-rename off
setw -g automatic-rename off

# Indices
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ---------- Prefix ----------
# NOTE: C-z conflicts with shell "suspend" in some apps.
# If that ever annoys you, switch to C-a.
unbind C-b
set -g prefix C-z
bind C-z send-prefix

# ---------- Quality keybinds ----------
# Create/split in current working directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload
bind r source-file ~/.tmux.conf \; display-message "Reloaded tmux.conf"

# Vim-ish pane nav (no prefix-repeat weirdness)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap panes
bind < swap-pane -U
bind > swap-pane -D

# ---------- Clipboard / copy-mode (macOS) ----------
# Let tmux talk to system clipboard when possible
set -g set-clipboard on

setw -g mode-keys vi

# Enter copy-mode
bind Enter copy-mode

# Keyboard selection + copy to macOS clipboard
bind-key -T copy-mode-vi v     send-keys -X begin-selection
bind-key -T copy-mode-vi V     send-keys -X select-line
bind-key -T copy-mode-vi r     send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse drag in copy-mode: copy to clipboard on release (nice + fast)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# NOTE (kitty):
# - For normal "terminal selection" use Shift+drag, then Cmd+C / Cmd+V (kitty handles that).
# - For tmux scrollback selection, use copy-mode (Enter) then y.

# ---------- Status bar ----------
set -g status-interval 5
set -g status-position bottom

# ---------- Plugins (TPM) ----------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Restore sessions (optional but useful)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Catppuccin theme (kept + tuned so footer looks filled)
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_status_fill "all"
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator ""

# Keep your right side simple
set -g status-right "#{E:@catppuccin_status_directory}  %Y-%m-%d  %H:%M "

run '~/.tmux/plugins/tpm/tpm'

